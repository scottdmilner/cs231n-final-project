[project]
name = "StyleID"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "albumentations>=2.0.8",
    "clip",
    "diffusers>=0.37.1",
    "einops>=0.8.2",
    "imageio>=2.37.3",
    "imageio-ffmpeg>=0.6.0",
    "invisible-watermark>=0.2.0",
    "kornia>=0.8.3",
    "lpips>=0.1.4",
    "numpy>=2.4.5",
    "omegaconf>=2.3.0",
    "opencv-python>=4.13.0.92",
    "pudb>=2025.1.5",
    "pytorch-lightning>=2.6.5",
    "requests>=2.34.2",
    "scikit-learn>=1.8.0",
    "streamlit>=1.57.0",
    "taming",
    "test-tube>=0.7.5",
    "torch>=2.12.0",
    "torch-fidelity>=0.4.0",
    "torchmetrics>=1.9.0",
    "torchvision>=0.27.0",
    "transformers>=5.9.0",
]

[tool.uv.sources]
clip = { git = "https://github.com/openai/CLIP.git", rev = "main" }
taming = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["StyleID"]

[tool.hatch.build.hooks.custom]
