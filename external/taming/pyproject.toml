[project]
name = "taming"
version = "0.0.1"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "albumentations>=2.0.8",
    "einops>=0.8.2",
    "imageio>=2.37.3",
    "imageio-ffmpeg>=0.6.0",
    "more-itertools>=11.1.0",
    "numpy>=2.4.5",
    "omegaconf>=2.3.0",
    "opencv-python>=4.13.0.92",
    "pudb>=2025.1.5",
    "pytorch-lightning>=2.6.5",
    "streamlit>=1.57.0",
    "test-tube>=0.7.5",
    "torch>=2.12.0",
    "torchvision>=0.27.0",
    "transformers>=5.9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["taming-transformers/taming"]
